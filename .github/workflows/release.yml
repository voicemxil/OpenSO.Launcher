name: Release launcher

# Cut a release by pushing a semver tag: `git tag v0.1.0 && git push origin v0.1.0`
# (or run manually via the Actions tab, supplying the version). Builds a self-contained launcher for each
# platform, zips it with the RID in the name, and publishes a GitHub Release. The launcher's
# SelfUpdateService reads releases/latest, downloads the .zip whose name contains its RID, and swaps itself
# in — so these RID-named zips are exactly what self-update consumes.

on:
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. v0.1.0"
        required: true
        default: "v0.0.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: macos-latest,   rid: osx-arm64 }
          # osx-x64 cross-published on the arm64 mac runner — macos-13 (Intel) is being retired and its
          # runners hang in the queue. Self-contained publish doesn't execute, so cross-RID is fine.
          - { os: macos-latest,   rid: osx-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then V="${GITHUB_REF_NAME}"; else V="${{ github.event.inputs.version }}"; fi
          # Strip a leading v for the assembly version (SelfUpdateService compares assembly Major.Minor.Build).
          echo "tag=$V" >> "$GITHUB_OUTPUT"
          echo "num=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (${{ matrix.rid }})
        shell: bash
        run: |
          dotnet publish OpenSO.Launcher/OpenSO.Launcher.csproj -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:Version=${{ steps.ver.outputs.num }} -p:PublishSingleFile=false -o publish

      - name: Zip (Unix)
        if: runner.os != 'Windows'
        run: ( cd publish && zip -r "../OpenSO.Launcher-${{ matrix.rid }}.zip" . )

      - name: macOS .app bundle + DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.num }}"
          APP="OpenSO Launcher.app"
          rm -rf "$APP"; mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R publish/. "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/OpenSO.Launcher"

          PL="$APP/Contents/Info.plist"
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict></dict></plist>' > "$PL"
          plutil -insert CFBundleName               -string "OpenSO Launcher"     "$PL"
          plutil -insert CFBundleDisplayName        -string "OpenSO Launcher"     "$PL"
          plutil -insert CFBundleIdentifier         -string "org.openso.launcher" "$PL"
          plutil -insert CFBundleExecutable         -string "OpenSO.Launcher"     "$PL"
          plutil -insert CFBundlePackageType        -string "APPL"                "$PL"
          plutil -insert CFBundleShortVersionString -string "$VER"                "$PL"
          plutil -insert CFBundleVersion            -string "$VER"                "$PL"
          plutil -insert CFBundleIconFile           -string "openso"              "$PL"
          plutil -insert LSMinimumSystemVersion     -string "11.0"                "$PL"
          plutil -insert NSHighResolutionCapable    -bool true                    "$PL"

          # Liquid Glass icon (macOS 26+): if an Icon Composer .icon is committed, compile it with actool
          # (ships with Xcode on the runner) into Assets.car and reference it via CFBundleIconName. No .icon
          # yet -> the legacy .icns below is the only icon.
          ICON="OpenSO.Launcher/Assets/openso.icon"
          if [ -e "$ICON" ]; then
            xcrun actool "$ICON" --compile "$APP/Contents/Resources" \
              --output-partial-info-plist /tmp/icon.plist --app-icon Icon --include-all-app-icons \
              --enable-on-demand-resources NO --development-region en \
              --target-device mac --minimum-deployment-target 26.0 --platform macosx
            plutil -insert CFBundleIconName -string Icon "$PL"
            echo "Embedded Liquid Glass .icon (Assets.car)."
          else
            echo "No openso.icon committed yet — legacy .icns only."
          fi

          # Legacy .icns from the glyph SVG (always; macOS < 26 fallback + universal).
          brew install librsvg >/dev/null
          rsvg-convert -w 1024 -h 1024 "OpenSO.Launcher/Assets/openso-glyph.svg" -o icon_1024.png
          mkdir -p icon.iconset
          for p in 16:16x16 32:16x16@2x 32:32x32 64:32x32@2x 128:128x128 256:128x128@2x 256:256x256 512:256x256@2x 512:512x512 1024:512x512@2x; do
            sz="${p%%:*}"; nm="${p##*:}"
            sips -z "$sz" "$sz" icon_1024.png --out "icon.iconset/icon_${nm}.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/openso.icns"

          # Ad-hoc sign so the app launches (Apple Silicon kills unsigned native code).
          codesign --force --deep -s - "$APP"

          # DMG with a drag-to-Applications symlink (hdiutil only — no Finder/create-dmg dependency).
          DMG="OpenSO-Launcher-${{ matrix.rid }}.dmg"
          STAGE="$RUNNER_TEMP/dmg"; rm -rf "$STAGE"; mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"; ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "OpenSO Launcher" -srcfolder "$STAGE" -ov -format UDZO "$DMG"

      - name: Upload DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-dmg-${{ matrix.rid }}
          path: OpenSO-Launcher-${{ matrix.rid }}.dmg

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "OpenSO.Launcher-${{ matrix.rid }}.zip" -Force

      - name: Windows installer (Inno Setup)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y --limit-output
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=${{ steps.ver.outputs.num }}" "/DPublishDir=$PWD\publish" "OpenSO.Launcher\installer\windows.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.rid }}
          path: OpenSO.Launcher-${{ matrix.rid }}.zip

      - name: Upload installer
        if: matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-installer-win
          path: OpenSO.Launcher/installer/Output/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: launcher-*
          merge-multiple: true

      - name: Resolve tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then V="${GITHUB_REF_NAME}"; else V="${{ github.event.inputs.version }}"; fi
          echo "tag=$V" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: OpenSO Launcher ${{ steps.ver.outputs.tag }}
          files: |
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.dmg
          fail_on_unmatched_files: true
