<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 512 512">
  <!-- Background layer (bottom). Fills the whole canvas; the system masks it to the rounded-rect.
       OpenSO navy gradient. In Icon Composer you can also replace this with a solid/gradient fill. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#102844"/>
      <stop offset="1" stop-color="#0A1626"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
</svg>
